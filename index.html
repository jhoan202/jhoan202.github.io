<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhoan Sebastian | Network Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        
        /* UI Superior */
        .ui-top {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            display: flex; align-items: center; gap: 20px; pointer-events: none;
        }
        .ui-top img { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid #fff; pointer-events: auto;
        }
        .brand h1 { font-size: 0.9rem; margin: 0; letter-spacing: 2px; }
        .brand p { font-size: 0.6rem; margin: 0; opacity: 0.5; text-transform: uppercase; }

        /* Contacto Lateral */
        .ui-side {
            position: absolute; bottom: 30px; left: 30px; z-index: 100;
            font-size: 0.7rem; line-height: 2; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;
        }
        .ui-side a { color: #00f2ff; text-decoration: none; }

        /* Instrucciones */
        .helper {
            position: absolute; bottom: 30px; right: 30px;
            font-size: 0.6rem; opacity: 0.3; text-align: right; letter-spacing: 1px;
        }

        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="ui-top">
        <img src="https://lh3.googleusercontent.com/a/ACg8ocJjOQPPjy9UEYOI57oqtBLHwl8Y7VgFJGXg8Q3JzYivZoUfEt53=s288-c-no" alt="Jhoan">
        <div class="brand">
            <h1>JHOAN BARRERA</h1>
            <p>Ingenieria en Telecomunicaciones</p>
        </div>
    </div>

    <div class="ui-side">
        +57 316 6569688<br>
        <a href="mailto:jhoansebastianbarreravanegas@gmail.com">jhoansebastianbarreravanegas@gmail.com</a>
    </div>

    <div class="helper">ARRASTRAR PARA ROTAR<br>CLICK EN BLOQUE PARA ABRIR</div>

    <script>
        const projects = [
            { name: "SQL_BLIND", url: "https://github.com/jhoan202/SQL_Blind" },
            { name: "VER_DOCENTE", url: "https://github.com/jhoan202/ver-docente" },
            { name: "GOLD_ROULETTE", url: "https://github.com/jhoan202/GoldRoulette_Channel" },
            { name: "WEBSOCKET", url: "https://github.com/jhoan202/Websocket" },
            { name: "FB_PROJECT", url: "https://github.com/jhoan202/Fb_Project" },
            { name: "DJANGO_EMAIL", url: "https://github.com/jhoan202/Enviar-email-con-django" },
            { name: "SHUTDOWN_PC", url: "https://github.com/jhoan202/Apagar_PC_SO_Windows" },
            { name: "GAUSS_JORDAN", url: "https://github.com/jhoan202/gauss-jordan" },
            { name: "PARALLEL_DL", url: "https://github.com/jhoan202/descargas_paralelas" },
            { name: "MEMORY_GAME", url: "https://github.com/jhoan202/Juego_memoria" },
            { name: "CHAT_APP", url: "https://github.com/jhoan202/Chat" },
            { name: "KEYLOGGER", url: "https://github.com/jhoan202/Simulador_Keylogger" }
        ];

        let scene, camera, renderer, group;
        let isDragging = false;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            group = new THREE.Group();

            projects.forEach((proj, i) => {
                // Crear bloque (microservicio)
                const geometry = new THREE.BoxGeometry(4, 1.5, 0.5);
                
                // Canvas para el texto dentro del bloque
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512; canvas.height = 128;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'black';
                ctx.font = 'bold 45px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText(proj.name, 256, 80);

                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.MeshBasicMaterial({ map: texture });
                const block = new THREE.Mesh(geometry, material);

                // Distribución aleatoria dispersa pero equilibrada
                block.position.x = (Math.random() - 0.5) * 30;
                block.position.y = (Math.random() - 0.5) * 20;
                block.position.z = (Math.random() - 0.5) * 15;
                
                block.userData = { url: proj.url };
                group.add(block);
            });

            scene.add(group);

            // Partículas de fondo para dar profundidad
            const pGeo = new THREE.BufferGeometry();
            const pCount = 1000;
            const pPos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random() - 0.5) * 100;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.05, color: 0x444444 });
            scene.add(new THREE.Points(pGeo, pMat));
        }

        // Interacción: Arrastrar para rotar la vista
        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                group.rotation.y += e.movementX * 0.005;
                group.rotation.x += e.movementY * 0.005;
            }
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Click para abrir link
        window.addEventListener('click', (e) => {
            const raycaster = new THREE.Raycaster();
            const m = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(m, camera);
            const intersects = raycaster.intersectObjects(group.children);
            if (intersects.length > 0) window.open(intersects[0].object.userData.url, '_blank');
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Animación sutil automática
            if(!isDragging) {
                group.rotation.y += 0.001;
                group.rotation.x += 0.0005;
            }

            // Hacer que los bloques siempre miren a la cámara (billboarding parcial)
            group.children.forEach(b => {
                b.lookAt(camera.position);
            });

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        init();
        animate();
    </script>
</body>
</html>
